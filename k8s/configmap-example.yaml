apiVersion: v1
kind: ConfigMap
metadata:
  name: dipper-config
  labels:
    app: dipper
data:
  config.json: |
    {
      "dips": {
        "service": "0x0000000000000000000000000000000000000000",
        "max_initial_amount": "0",
        "max_ongoing_amount_per_epoch": "0",
