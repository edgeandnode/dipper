apiVersion: v1
kind: ConfigMap
metadata:
  name: dipper-config
  labels:
    app: dipper
data:
  config.json: |
    {
      "dips": {
        "data_service": "0x0000000000000000000000000000000000000000",
        "recurring_collector": "0x0000000000000000000000000000000000000000",
        "max_seconds_per_collection": 86400,
        "min_seconds_per_collection": 3600,
        "duration_seconds": null,
        "deadline_seconds": 600,
        "pricing_table": {},
        "max_agreement_grt_per_30_days": 20000,
        "max_grt_per_30_days": {
          "arbitrum-one": 4500,
          "mainnet": 450,
          "base": 2000,
          "optimism": 1500,
          "matic": 3000
        },
        "max_grt_per_billion_entities_per_30_days": 2000
      },
      "admin_rpc": {
        "listen_addr": "0.0.0.0:8545",
        "gateway_operator_allowlist": []
      },
      "indexer_rpc": {
        "listen_addr": "0.0.0.0:50051",
        "allowlist": []
      },
      "db": {
        "url": "postgres://localhost:5432/dipper",
        "username": "dipper",
        "password": "REPLACE_ME",
        "max_connections": 10
      },
      "network": {
        "gateway_url": "https://gateway.thegraph.com",
        "api_key": "REPLACE_ME",
        "deployment_id": "REPLACE_ME",
        "update_interval": 60
      },
      "signer": {
        "secret_key": "REPLACE_ME",
        "chain_id": 42161
      },
      "tap_signer": {
        "secret_key": "REPLACE_ME",
        "chain_id": 42161,
        "verifier": "0x0000000000000000000000000000000000000000"
      },
      "iisa": {
        "endpoint": "http://iisa:8080",
        "request_timeout": 30,
        "connect_timeout": 10,
        "max_retries": 3
      },
      "indexer_client": {
        "request_timeout": 240,
        "connect_timeout": 10,
        "max_retries": 3
      },
      "reassignment": {
        "enabled": true,
        "interval": 86400,
        "run_at_utc_hour": 10,
        "batch_size": 100,
        "min_request_age": 86400
      },
      "expiration": {
        "enabled": true,
        "interval": 90,
        "batch_size": 100
      },
      "chain_listener": {
        "enabled": true,
        "subgraph_endpoint": "REPLACE_ME",
        "chain_id": 42161,
        "poll_interval": 30,
        "request_timeout": 30,
        "max_retries": 3
      },
      "liveness_checker": {
        "enabled": false,
        "interval": 300,
        "max_tolerance_days": 4,
        "request_timeout": 10,
        "batch_size": 500
      },
      "chain_client": {
        "enabled": false,
        "providers": [
          "https://arb1.arbitrum.io/rpc",
          "https://arbitrum-one.publicnode.com"
        ],
        "request_timeout": 30,
        "max_retries": 3,
        "subgraph_service_address": "0x0000000000000000000000000000000000000000",
        "gas_price_multiplier": 1.2,
        "max_gas_price_gwei": 100,
        "gas_buffer_multiplier": 2.0,
        "gas_floor": 100000,
        "gas_max_addition": 200000
      }
    }
