apiVersion: apps/v1
kind: Deployment
metadata:
  name: dipper
  labels:
    app: dipper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dipper
  template:
    metadata:
      labels:
        app: dipper
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: dipper
          image: ghcr.io/edgeandnode/dipper-service:v0.1.7 # x-release-please-version
          args:
            - /config/config.json
          ports:
            - name: admin-rpc
              containerPort: 8545
              protocol: TCP
            - name: indexer-rpc
              containerPort: 50051
              protocol: TCP
            - name: health
              containerPort: 8546
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Probe the worker health endpoint, not just a TCP socket: it returns
          # 503 once the worker watermark goes stale, so a wedged worker (alive
          # but making no progress) is restarted. A plain admin-rpc TCP check
          # stays up in that state and would never catch it.
          livenessProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: admin-rpc
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dipper-config
