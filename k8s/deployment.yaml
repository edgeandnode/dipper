apiVersion: apps/v1
kind: Deployment
metadata:
  name: dipper
  labels:
    app: dipper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dipper
  template:
    metadata:
      labels:
        app: dipper
    spec:
      containers:
        - name: dipper
          image: ghcr.io/edgeandnode/dipper-service:latest
          args:
            - /config/config.json
          ports:
            - name: admin-rpc
              containerPort: 8545
              protocol: TCP
            - name: indexer-rpc
              containerPort: 50051
              protocol: TCP
          livenessProbe:
            tcpSocket:
              port: admin-rpc
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: admin-rpc
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dipper-config
