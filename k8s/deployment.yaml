apiVersion: apps/v1
kind: Deployment
metadata:
  name: dipper
  labels:
    app: dipper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dipper
  template:
    metadata:
      labels:
        app: dipper
    spec:
      # Above the service's own shutdown ceiling (each of its ~11 stop steps is
      # capped at 5s, then a 5s event flush), so it exits on its own terms and a
      # SIGKILL part-way through the teardown stays out of reach.
      terminationGracePeriodSeconds: 90
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: dipper
          image: ghcr.io/edgeandnode/dipper-service:v0.1.7 # x-release-please-version
          args:
            - /config/config.json
          ports:
            - name: admin-rpc
              containerPort: 8545
              protocol: TCP
            - name: indexer-rpc
              containerPort: 50051
              protocol: TCP
            - name: health
              containerPort: 8546
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # Startup can take minutes: a retrying RPC domain fetch, database
          # migrations and an indexer URL snapshot all run before the health
          # port opens. Liveness stays suspended until this passes (600s).
          startupProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          # Probe the health endpoint, not a TCP socket: it returns 503 once the
          # worker watermark goes stale, catching a worker that is alive but
          # stuck. 6 failures so a brief stall cannot kill the only replica.
          livenessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: admin-rpc
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: dipper-config
