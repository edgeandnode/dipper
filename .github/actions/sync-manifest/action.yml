name: 'Sync Release Manifest'
description: 'Check for and optionally fix drift between git tags and release-please manifest'

inputs:
  auto-commit:
    description: 'Whether to automatically commit and push manifest updates'
    required: false
    default: 'true'

outputs:
  drift:
    description: 'Whether manifest drift was detected'
    value: ${{ steps.check.outputs.drift }}
  latest-version:
    description: 'Latest version from git tags'
    value: ${{ steps.check.outputs.latest_version }}
  manifest-version:
    description: 'Version currently in manifest'
    value: ${{ steps.check.outputs.manifest_version }}
  synced:
    description: 'Whether the manifest was synced'
    value: ${{ steps.update.outputs.synced || 'false' }}

runs:
  using: 'composite'
  steps:
    - name: Check for manifest drift
      id: check
      shell: bash
      run: |
        # Compare semver versions: returns 0 if $1 > $2
        version_gt() {
          test "$(printf '%s\n' "$1" "$2" | sort -V | head -n1)" != "$1"
        }

        # Get latest tag (with fallback if no tags exist)
        LATEST_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || echo "v0.0.0")
        LATEST_VERSION="${LATEST_TAG#v}"

        # Get manifest version (with error handling for missing/invalid file)
        MANIFEST_VERSION=$(jq -r '.["."] // "0.0.0"' .release-please-manifest.json 2>/dev/null || echo "0.0.0")

        echo "Latest tag: $LATEST_TAG ($LATEST_VERSION)"
        echo "Manifest version: $MANIFEST_VERSION"

        echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
        echo "manifest_version=$MANIFEST_VERSION" >> $GITHUB_OUTPUT

        # Only sync if tag is AHEAD of manifest (never downgrade)
        # This prevents reverting manifest during release PR merges
        if [ "$LATEST_VERSION" != "$MANIFEST_VERSION" ] && version_gt "$LATEST_VERSION" "$MANIFEST_VERSION"; then
          echo "drift=true" >> $GITHUB_OUTPUT
          echo "Drift detected - manifest ($MANIFEST_VERSION) is behind tag ($LATEST_VERSION)"
        elif [ "$LATEST_VERSION" != "$MANIFEST_VERSION" ]; then
          echo "drift=false" >> $GITHUB_OUTPUT
          echo "Manifest ($MANIFEST_VERSION) is ahead of tag ($LATEST_VERSION) - release in progress, skipping"
        else
          echo "drift=false" >> $GITHUB_OUTPUT
          echo "Manifest is in sync with tags"
        fi

    - name: Update manifest if drifted
      id: update
      if: steps.check.outputs.drift == 'true' && inputs.auto-commit == 'true'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VERSION="${{ steps.check.outputs.latest_version }}"
        OLD_VERSION="${{ steps.check.outputs.manifest_version }}"
        BRANCH="chore/sync-manifest-to-${VERSION}"

        # Check if PR already exists for this sync
        EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number' 2>/dev/null || echo "")
        if [ -n "$EXISTING_PR" ]; then
          echo "PR #$EXISTING_PR already exists for this manifest sync"
          echo "synced=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Build the updated manifest content
        if ! jq --arg version "$VERSION" '.["."] = $version' .release-please-manifest.json > manifest.tmp 2>/dev/null; then
          echo "Warning: Could not update manifest, creating new one"
          echo "{\".\": \"$VERSION\"}" > manifest.tmp
        fi

        # Commit through the GitHub API so it carries GitHub's verified signature:
        # a local `git commit` on the runner is unsigned and the "require verified
        # signatures" ruleset rejects it (GH013); API commits are signed by GitHub.
        REPO="$GITHUB_REPOSITORY"
        BASE_SHA=$(git rev-parse HEAD)
        FILE_SHA=$(gh api "repos/$REPO/contents/.release-please-manifest.json?ref=$BASE_SHA" --jq '.sha')
        CONTENT=$(base64 -w0 manifest.tmp)
        rm -f manifest.tmp

        # Branch off the current commit, then write the manifest onto it.
        gh api --method POST "repos/$REPO/git/refs" \
          -f "ref=refs/heads/$BRANCH" \
          -f "sha=$BASE_SHA"

        gh api --method PUT "repos/$REPO/contents/.release-please-manifest.json" \
          -f "message=chore: sync manifest to $VERSION (was $OLD_VERSION)" \
          -f "content=$CONTENT" \
          -f "sha=$FILE_SHA" \
          -f "branch=$BRANCH"

        # Body is built with printf so each line stays inside the YAML block
        # scalar's indent — bare column-0 lines would terminate the scalar and
        # break the workflow YAML parse.
        BODY=$(printf '%s\n' \
          "Auto-generated PR to sync release-please manifest with git tags." \
          "" \
          "- **Previous version:** $OLD_VERSION" \
          "- **Target version:** $VERSION" \
          "" \
          "This PR was created because the manifest version fell behind the latest git tag, likely due to a manual release.")

        gh pr create \
          --title "chore: sync release-please manifest to $VERSION" \
          --body "$BODY" \
          --base main \
          --head "$BRANCH"

        echo "synced=true" >> $GITHUB_OUTPUT
        echo "Created PR to sync manifest: $OLD_VERSION -> $VERSION"
