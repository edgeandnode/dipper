name: ci
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTFLAGS: '-C link-arg=-fuse-ld=lld'

jobs:
  # Clippy runs in parallel with tests to reduce wall-clock time
  # NOTE: For faster builds, ubuntu-latest-4-cores or ubuntu-latest-8-cores are available
  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Prepare build env
        run: sudo apt-get update && sudo apt-get install -y lld protobuf-compiler

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1
        with:
          components: clippy
          cache: false
          rustflags: ''

      - name: Cache Rust build files
        uses: leafwing-studios/cargo-cache@ba6ee760ccdefa26b630cff8094e3243ae86a2c9 # v2
        with:
          sweep-cache: true

      - run: cargo clippy -- -D warnings --force-warn deprecated --force-warn dead-code

  test-rust:
    runs-on: ubuntu-latest
    # Fork PRs don't receive repository secrets, so the age key that decrypts the
    # tests .env is empty. HAS_AGE_KEY lets the steps below run the same tests
    # without decryption; secret-dependent integration tests self-skip via test_with.
    env:
      HAS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY != '' }}
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Prepare build env
        run: sudo apt-get update && sudo apt-get install -y lld protobuf-compiler

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache Rust build files
        uses: leafwing-studios/cargo-cache@ba6ee760ccdefa26b630cff8094e3243ae86a2c9 # v2
        with:
          sweep-cache: true

      - name: Install cargo-nextest
        uses: taiki-e/install-action@dfcb1ee29051d97c8d0f2d437199570008fd5612 # v2
        with:
          tool: cargo-nextest

      # Install sops (needed for decrypting tests .env file)
      - name: Setup sops
        uses: nhedger/setup-sops@187c90dbb4e28c3225263886266a5b92baa7e5a1 # v2

      # Install age (needed for decrypting tests .env file)
      - name: Setup age
        uses: alessiodionisi/setup-age-action@82b9aea163ade7fe23441552a514cf666b214077 # v1.3.0

      - name: Unit tests
        if: env.HAS_AGE_KEY == 'true'
        uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
        env:
          SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
        with:
          env_file: .env
          run: cargo nextest run --all-features -E 'test(~tests::) - test(~tests::it_)'

      - name: Unit tests (no decryption key)
        if: env.HAS_AGE_KEY != 'true'
        run: cargo nextest run --all-features -E 'test(~tests::) - test(~tests::it_)'

      - name: Install integration tests dependencies
        run: |
            sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
            sudo apt-get update
            sudo apt-get install -y postgresql-17
            echo "/usr/lib/postgresql/$(pg_lsclusters | awk 'NR==2 {print $1}')/bin" >> $GITHUB_PATH

      - name: Integration tests (in-tree)
        if: env.HAS_AGE_KEY == 'true'
        uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
        env:
          SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
        with:
          env_file: .env
          run: cargo nextest run --all-features -E 'test(~tests::it_)'

      - name: Integration tests (in-tree, no decryption key)
        if: env.HAS_AGE_KEY != 'true'
        run: cargo nextest run --all-features -E 'test(~tests::it_)'

      - name: Integration tests (public api)
        if: env.HAS_AGE_KEY == 'true'
        uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
        env:
          SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
        with:
          env_file: .env
          run: cargo nextest run --all-features -E 'kind(test)'

      - name: Integration tests (public api, no decryption key)
        if: env.HAS_AGE_KEY != 'true'
        run: cargo nextest run --all-features -E 'kind(test)'

  format-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@1780873c7b576612439a134613cc4cc74ce5538c # v1
        with:
          toolchain: nightly
          components: rustfmt
          cache: false

      - run: cargo +nightly fmt --all -- --check
