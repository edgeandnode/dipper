name: ci
on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ 'main' ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  FORCE_COLOR: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  RUSTFLAGS: '-C link-arg=-fuse-ld=lld'

jobs:
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Prepare build env
        run: sudo apt-get install -y lld protobuf-compiler

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@fb51252c7ba57d633bc668f941da052e410add48 # v1
        with:
          components: clippy
          cache: false
          rustflags: ''

      - name: Cache Rust build files
        uses: leafwing-studios/cargo-cache@43ec9a5bad6e7f174e7fc65dcf533de75ff65881 # v2
        with:
          sweep-cache: true

      - name: Set up uv
        uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b # v6
        with:
          enable-cache: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python and install dependencies
        id: python
        run: |
          # Install Python dependencies
          uv sync --frozen --no-install-project

          # Set PYTHON_LIB_DIR output param to the directory containing the libpython shared library
          echo "PYTHON_LIB_DIR=$(dirname `uv run --frozen find_libpython`)" >> $GITHUB_OUTPUT

      ## Check
      - run: cargo clippy -- -D warnings --force-warn deprecated --force-warn dead-code
        env:
            PYTHON_LIB_DIR: ${{ steps.python.outputs.PYTHON_LIB_DIR }}

      ## Test
      # Install sops (needed for decrypting tests .env file)
      - name: Setup sops
        uses: nhedger/setup-sops@187c90dbb4e28c3225263886266a5b92baa7e5a1 # v2

      # Install age (needed for decrypting tests .env file)
      - name: Setup age
        uses: alessiodionisi/setup-age-action@82b9aea163ade7fe23441552a514cf666b214077 # v1.3.0

      - name: Unit tests
        uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
        env:
          SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
          PYTHON_LIB_DIR: ${{ steps.python.outputs.PYTHON_LIB_DIR }}
        with:
          env_file: .env
          run: uv run --frozen cargo test --all-features 'tests::' -- --skip 'tests::it_'

      - name: Install integration tests dependencies
        run: |
            sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
            wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
            sudo apt-get update
            sudo apt-get install -y postgresql-17
            echo "/usr/lib/postgresql/$(pg_lsclusters | awk 'NR==2 {print $1}')/bin" >> $GITHUB_PATH

      - name: Integration tests (in-tree)
        uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
        env:
          SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
          PYTHON_LIB_DIR: ${{ steps.python.outputs.PYTHON_LIB_DIR }}
        with:
          env_file: .env
          run: uv run --frozen cargo test --all-features 'tests::it_'

      - name: Integration tests (public api)
        uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
        env:
          SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
          PYTHON_LIB_DIR: ${{ steps.python.outputs.PYTHON_LIB_DIR }}
        with:
          env_file: .env
          run: uv run --frozen cargo test --all-features --test '*'

  format-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@fb51252c7ba57d633bc668f941da052e410add48 # v1
        with:
          toolchain: nightly
          components: rustfmt
          cache: false

      - run: cargo +nightly fmt --all -- --check

  test-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b # v6
      with:
        enable-cache: true
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python and install dependencies
      run: uv sync --frozen --dev

    ## Check
    - name: Check Python code (ruff)
      run: uv run --frozen ruff check

    - name: Run mypy static type checker
      run: uv run --frozen mypy

    ## Test
    # Install sops (needed for decrypting tests .env file)
    - name: Setup sops
      uses: nhedger/setup-sops@187c90dbb4e28c3225263886266a5b92baa7e5a1 # v2

    # Install age (needed for decrypting tests .env file)
    - name: Setup age
      uses: alessiodionisi/setup-age-action@82b9aea163ade7fe23441552a514cf666b214077 # v1.3.0

    - name: Run Python tests
      uses: LNSD/sops-exec-action@6da1fbca63459d9796097496d5f5e6233555b31a # v1
      env:
        SOPS_AGE_KEY: ${{ secrets.IT_TESTS_AGE_KEY }}
      with:
        env_file: .env
        run: uv run --frozen pytest -v

  format-python:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

    - uses: astral-sh/setup-uv@4959332f0f014c5280e7eac8b70c90cb574c9f9b # v6
      with:
        enable-cache: true
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Python code formatting (ruff)
      run: uv run --frozen ruff format --check
