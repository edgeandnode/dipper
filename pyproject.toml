[project]
name = "dipper"
version = "0.1.0"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "airportsdata>=20240806",
    "bigframes>=1.16.0",
    "community>=1.0.0b1",
    "networkx>=3.3",
    "numpy>=1.26.4",
    "pandas>=2.2.2",
    "pandera>=0.20.4",
    "requests>=2.32.3",
    "scipy>=1.14.1",
    "scikit-learn>=1.5.1",
    "tenacity>=9.0.0",
]

[tool.uv]
dev-dependencies = [
    "freezegun>=1.5.1",
    "mypy>=1.11.2",
    "pandera[mypy]>=0.20.4",
    "pytest>=8.3.2",
    "pytest-mock>=3.14.0",
    "ruff>=0.6.4",
    "types-requests>=2.32.0.20240905",
]


## mypy configuration
[tool.mypy]
files = [
    "assets/iisa/**/*.py",
]
exclude = [
    "tests/",
    'test_.*\.py$',
    '_test\.py$',
]
plugins = 'pandera.mypy'

[[tool.mypy.overrides]]
module = "scipy.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "sklearn.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pyarrow.*"
ignore_missing_imports = true


# pytest configuration
[tool.pytest.ini_options]
minversion = "6.0"
testpaths = [
    "assets/tests"
]


# hatchling configuration
[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.sdist]
include = [
    "assets/iisa",
]
exclude = [
    "tests/",
]

[tool.hatch.build.targets.wheel]
packages = ["assets/iisa"]

