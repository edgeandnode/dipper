[workspace]
resolver = "2"
members = [
    "crates/bin/dipper-cli",
    "crates/bin/dipper-service",
    "crates/dipper-common"
, "xtask"]

[workspace.dependencies]
# local
gateway-common = { path = "../gateway/gateway-common" }

# external
anyhow = "1.0"
async-trait = "0.1"
async-tls = "0.13"
async-signal = "0.2"
async-select = "0.2"
bincode = "1.3"
dotenvy = "0.15"
clap = "4.5.4"
ethers-rs = "0.2"
futures-lite = "2.3"
log = "0.4"
pyo3 = "0.21"
smol = "2"
surf = "2.3"
tempfile = "3"
thiserror = "1.0"
tide = "0.16"
serde = { version = "1.0", features = ["derive"] } 
serde_yaml = "0.9"
clap-serde = "0.5"
sled = "0.34"
simple_logger = "5"

