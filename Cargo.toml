[workspace]
resolver = "2"
members = [
    "crates/bin/dipper-cli",
    "crates/bin/dipper-service",
    "crates/dipper",
    "crates/integration-tests",
    "xtask"
]

[workspace.dependencies]
anyhow = "1.0"
async-select = "0.2"
async-signal = "0.2"
axum = "0.7.5"
bincode = "1.3"
clap = { version = "4.5.4", features = ["derive"] }
duct = "0.13"
futures-lite = "2.3"
log = { version = "0.4", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
simple_logger = "5"
sled = "0.34"
smol = "2"
reqwest = "0.12"
tempfile = "3"
thiserror = "1.0"
tokio = { version = "1.40", default-features = false }
tower = "0.4"
