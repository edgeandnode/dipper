[workspace]
resolver = "2"
members = [
    "crates/bin/dipper-cli",
    "crates/bin/dipper-service",
    "crates/dipper-common", "crates/integration-tests",
    "crates/subgraph", 
    "xtask"
]

[workspace.dependencies]
thegraph-core = { git = "https://github.com/edgeandnode/toolshed.git", features = ["subgraph-client"] } 

anyhow = "1.0"
async-select = "0.2"
async-signal = "0.2"
async-tls = "0.13"
async-trait = "0.1"
axum = "0.7.5"
bincode = "1.3"
bytes =  "1.1"
clap = { version = "4.5.4", features = ["derive"] }
clap-serde = "0.5"
dotenvy = "0.15"
duct = "0.13"
ethers-rs = "0.2"
futures-lite = "2.3"
log = { version = "0.4", features = ["serde"] }
pyo3 = "0.21"
serde = { version = "1.0", features = ["derive"] } 
serde_yaml = "0.9"
simple_logger = "5"
sled = "0.34"
smol = "2"
reqwest = "0.12"
tempfile = "3"
thiserror = "1.0"
tokio = { version = "1.0", features = ["full"] }
tower = "0.4"
