[package]
name = "dipper-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow.workspace = true
clap = { workspace = true, features = ["cargo", "env"] }
custom_debug = "0.6.1"
dipper-core = { version = "0.1.0", path = "../../dipper-core" }
dipper-rpc = { version = "0.1.0", path = "../../dipper-rpc", features = ["admin-rpc"] }
dotenvy = "0.15.7"
figment = { version = "0.10.19", features = ["env"] }
indoc = "2.0"
jsonrpsee = { workspace = true, features = ["http-client"] }
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
serde-envfile = { git = "https://github.com/LNSD/serde-envfile.git", rev = "006e135", version = "0.2.0", features = ["preserve_order"] }
snmalloc-rs = "0.3.6"
thegraph-core = { workspace = true, features = ["alloy-signer-local", "signed-message"] }
thiserror.workspace = true
tokio = { workspace = true, features = ["rt", "macros"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
url.workspace = true
uuid.workspace = true
