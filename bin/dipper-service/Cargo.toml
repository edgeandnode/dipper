[package]
name = "dipper-service"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
async-signal = "0.2.10"
async-trait.workspace = true
custom_debug = "0.6.1"
dashmap = "6.1.0"
dipper-core = { version = "0.1.0", path = "../../dipper-core" }
dipper-iisa = { path = "../../dipper-iisa" }
dipper-pgmq = { path = "../../dipper-pgmq" }
dipper-registry = { path = "../../dipper-registry" }
dipper-rpc = { version = "0.1.0", path = "../../dipper-rpc" }
futures-lite = { version = "2.4.0", default-features = false }
indoc = "2.0.5"
jsonrpsee = { workspace = true, features = ["server"] }
reqwest = { workspace = true, features = ["json"] }
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
snmalloc-rs = "0.3.6"
sqlx.workspace = true
thegraph-core = { workspace = true, features = ["alloy-signer-local", "serde", "signed-message"] }
thegraph-graphql-http = { version = "0.2.4", features = ["http-client-reqwest"] }
thiserror.workspace = true
time.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }
tonic = { version = "0.12.3", default-features = false, features = ["server"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
url.workspace = true

[dev-dependencies]
test-with = { version = "0.14.4", default-features = false }
uuid.workspace = true
