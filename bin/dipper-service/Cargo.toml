[package]
name = "dipper-service"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
async-select = "0.2.0"
async-signal = "0.2.10"
async-trait.workspace = true
custom_debug = "0.6.1"
dipper-core = { version = "0.1.0", path = "../../dipper-core", features = ["rpc"] }
dipper-iisa = { path = "../../dipper-iisa" }
dipper-pgmq = { path = "../../dipper-pgmq" }
dipper-registry = { path = "../../dipper-registry" }
futures-lite = { version = "2.4.0", default-features = false }
indoc = "2.0.5"
jsonrpsee = { workspace = true, features = ["server"] }
reqwest = { workspace = true, features = ["json"] }
serde.workspace = true
serde_json.workspace = true
serde_with.workspace = true
serde_yaml = { version = "0.10.0", package = "serde_yaml_ng" }
snmalloc-rs = "0.3.6"
sqlx.workspace = true
thegraph-core = { workspace = true, features = ["alloy-signer-local", "serde"] }
thegraph-graphql-http = { version = "0.2.4", features = ["http-client-reqwest"] }
thiserror.workspace = true
time.workspace = true
tokio = { workspace = true, features = ["rt-multi-thread"] }
tracing.workspace = true
tracing-subscriber = { version = "0.3.18", features = ["env-filter"] }
url.workspace = true

[dev-dependencies]
test-with = { version = "0.14.4", default-features = false }
uuid.workspace = true
