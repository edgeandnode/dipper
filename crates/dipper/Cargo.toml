[package]
name = "dipper"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow.workspace = true
bincode.workspace = true
pyo3 = { workspace = true, features = ["auto-initialize"] }
reqwest = { workspace = true, features = ["json"] }
semver = { version = "1.0.23", features = ["serde"] }
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0.125"
serde_with = "3.9.0"
sled.workspace = true
thegraph-core = { version = "0.6.0", features = ["subgraph-client", "serde"] }
thegraph-graphql-http = "0.2.4"
thiserror.workspace = true

[dev-dependencies]
smol.workspace = true
smol-potat = "1.1.2"
tempfile.workspace = true
